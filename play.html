<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Online - Históricos</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="game-container">
    <header class="site-header">
      <h1>Sudoku Online</h1>
      <nav class="site-nav">
        <a href="index.html">Inicio</a>
        <a href="play.html">Play</a>
        <a href="about.html">About</a>
        <a href="privacy.html">Privacy</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>
    <p class="subtitle">Tableros históricos</p>

    <section class="history-section">
      <h2 class="section-title">Selecciona un tablero</h2>
      <div id="puzzle-list" class="puzzle-list"></div>
    </section>

    <section class="board-section">
      <h2 id="current-puzzle-title" class="section-title">Ningún tablero cargado</h2>

      <div id="board" class="sudoku-board"></div>

      <div class="actions">
        <button id="check-button" type="button">Verificar</button>
      </div>

      <p id="message" class="message"></p>
    </section>
  </main>

  <script src="js/play.js"></script>

</html>
